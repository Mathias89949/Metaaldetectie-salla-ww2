<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>WO2 Locaties – Salla & Omgeving</title>

    <link rel="stylesheet" href="stijl.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>

<body>
    <div id="container">

        <div id="sidebar">
            <h2>WO2 Locaties</h2>

            <input type="text" id="zoekInput" placeholder="Zoek locatie...">

            <ul id="locatieLijst"></ul>

            <h3>Kaartlagen</h3>
            <label><input type="radio" name="basemap" value="osm" checked> OpenStreetMap</label><br>
            <label><input type="radio" name="basemap" value="sat"> Satelliet</label>

            <h3>Hillshade</h3>
            <label><input type="checkbox" id="hillshadeToggle" checked> Hillshade aan</label>

            <p>Sterkte:</p>
            <input type="range" id="hillshadeSlider" min="0" max="1" step="0.05" value="0.4">

        </div>

        <div id="map"></div>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="locaties.js"></script>
    <script src="kaart.js"></script>
</body>
</html>
